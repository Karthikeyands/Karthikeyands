<svg width="100%" viewBox="0 0 680 180" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Animated spider web divider</title>
<desc>Original spider web threads drawing in with a small spider descending on a silk line.</desc>

<g stroke="#1a8fff" stroke-width="1.4" fill="none" stroke-linecap="round">
  <line x1="0" y1="0" x2="220" y2="160">
    <animate attributeName="stroke-dasharray" from="0 400" to="400 0" dur="0.8s" fill="freeze"/>
  </line>
  <line x1="0" y1="0" x2="120" y2="170">
    <animate attributeName="stroke-dasharray" from="0 400" to="400 0" dur="0.8s" begin="0.1s" fill="freeze"/>
  </line>
  <line x1="0" y1="0" x2="40" y2="175">
    <animate attributeName="stroke-dasharray" from="0 400" to="400 0" dur="0.8s" begin="0.2s" fill="freeze"/>
  </line>
  <line x1="0" y1="0" x2="240" y2="90">
    <animate attributeName="stroke-dasharray" from="0 400" to="400 0" dur="0.8s" begin="0.3s" fill="freeze"/>
  </line>
  <line x1="0" y1="0" x2="250" y2="35">
    <animate attributeName="stroke-dasharray" from="0 400" to="400 0" dur="0.8s" begin="0.4s" fill="freeze"/>
  </line>
</g>

<g stroke="#e62429" stroke-width="1.2" fill="none" opacity="0.9">
  <path d="M 30 25 Q 60 55 30 85 Q 65 82 80 110 Q 50 120 50 150">
    <animate attributeName="stroke-dasharray" from="0 400" to="400 0" dur="1s" begin="0.6s" fill="freeze"/>
  </path>
  <path d="M 60 45 Q 105 80 80 125 Q 120 118 130 165">
    <animate attributeName="stroke-dasharray" from="0 500" to="500 0" dur="1s" begin="0.8s" fill="freeze"/>
  </path>
</g>

<g>
  <line x1="560" y1="0" x2="560" y2="90" stroke="#9fb3c8" stroke-width="1">
    <animate attributeName="y2" from="0" to="90" dur="1s" begin="0.9s" fill="freeze"/>
  </line>
  <g>
    <animateTransform attributeName="transform" type="translate" from="560 -40" to="560 90" dur="1s" begin="0.9s" fill="freeze"/>
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.9s" fill="freeze"/>
    <ellipse cx="0" cy="0" rx="10" ry="13" fill="#b3001b"/>
    <circle cx="0" cy="-12" r="6" fill="#0a1a3f"/>
    <circle cx="-2" cy="-13" r="1.4" fill="#e62429"/>
    <circle cx="2" cy="-13" r="1.4" fill="#e62429"/>
    <g stroke="#0a1a3f" stroke-width="1.5" fill="none" stroke-linecap="round">
      <path d="M -8 -4 Q -20 -9 -24 0"/>
      <path d="M -8 0 Q -22 0 -26 7"/>
      <path d="M 8 -4 Q 20 -9 24 0"/>
      <path d="M 8 0 Q 22 0 26 7"/>
      <path d="M -8 4 Q -20 9 -23 14"/>
      <path d="M 8 4 Q 20 9 23 14"/>
    </g>
  </g>
</g>
</svg>
